<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💍 Pedido</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
font-family:Arial;

background:linear-gradient(270deg,#ff4d6d,#ff85a2,#7209b7);
background-size:600% 600%;
animation:fundo 10s ease infinite;
color:white;
}

@keyframes fundo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

#conteudo{
max-width:350px;
line-height:1.6;
}

button{

margin:10px;
padding:12px 25px;

font-size:18px;

border:none;
border-radius:20px;

cursor:pointer;

}

#sim{
background:#ff2e63;
color:white;
}

#nao{
background:white;
color:black;
}

.heart{
position:absolute;
color:red;
animation:subir 6s linear infinite;
}

@keyframes subir{
from{
transform:translateY(100vh);
opacity:0;
}
to{
transform:translateY(-10vh);
opacity:1;
}
}

</style>
</head>

<body>

<div id="conteudo">

💌 Meu amor,<br><br>

Obrigado por cada momento que a gente vive juntos.<br>
Obrigado por cada call, cada conversa e cada risada. 🥰<br><br>

Você é muito especial pra mim  
e eu amo muito você. ❤️<br><br>

Eu prometo nunca desistir da gente  
e sempre estar ao seu lado. 💕<br><br>

Então eu preciso te perguntar...<br><br>

<b style="font-size:26px">
💍 Quer casar comigo? 💒
</b>

<br><br>

<button id="sim">💖 SIM</button>
<button id="nao">😢 NÃO</button>

</div>

<script>

const conteudo = document.getElementById("conteudo")

document.getElementById("sim").onclick = function(){

conteudo.innerHTML = `

<h2>💖 EU TE AMO MUITO 💖</h2>

<p>

Você me faz muito feliz.<br><br>

Obrigado por aceitar compartilhar sua vida comigo.<br>

Eu prometo cuidar de você  
e sempre fazer você sorrir. 🥰<br><br>

💍 Nosso amor é muito especial.

</p>

`

}

document.getElementById("nao").onclick = function(){

conteudo.innerHTML = `

<h2>😔 Desculpa...</h2>

<p>

Se eu fui rápido demais ou te coloquei em uma situação difícil.<br><br>

Eu só queria mostrar o quanto você é importante pra mim.<br><br>

Mesmo assim eu continuo gostando muito de você  
e desejando o melhor pra nós. 💔

</p>

`

}

/* corações */

setInterval(()=>{

const h=document.createElement("div")

h.className="heart"

h.innerHTML="❤"

h.style.left=Math.random()*100+"vw"

h.style.fontSize=(20+Math.random()*25)+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),6000)

},400)

</script>

</body>
</html>
