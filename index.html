<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💍 Pedido</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
font-family:Arial;

background:linear-gradient(270deg,#ff4d6d,#ff85a2,#7209b7);
background-size:600% 600%;
animation:fundo 10s ease infinite;
color:white;
}

@keyframes fundo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

#conteudo{
max-width:350px;
line-height:1.6;
}

button{
margin:10px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:20px;
cursor:pointer;
}

#sim{
background:#ff2e63;
color:white;
}

#nao{
background:white;
color:black;
}

</style>
</head>

<body>

<div id="conteudo">

💌 Meu amor,<br><br>

Obrigado por cada momento que a gente vive juntos.<br>
Obrigado por cada call, cada conversa e cada risada. 🥰<br><br>

Você é muito especial pra mim  
e eu amo muito você. ❤️<br><br>

Eu prometo nunca desistir da gente  
e sempre estar ao seu lado. 💕<br><br>

Então eu preciso te perguntar...<br><br>

<b style="font-size:26px">
💍 Quer casar comigo? 💒
</b>

<br><br>

<button id="sim">💖 SIM</button>
<button id="nao">😢 NÃO</button>

</div>

<script>

const numero = "5549989047100"

document.getElementById("sim").onclick = function(){

window.location.href =
"https://wa.me/"+numero+
"?text=Eu%20aceito%20casar%20com%20você%20❤️💍"

}

document.getElementById("nao").onclick = function(){

window.location.href =
"https://wa.me/"+numero+
"?text=Desculpa,%20mas%20não%20posso%20aceitar%20agora%20😔"

}

</script>

</body>
</html>
