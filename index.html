<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Para Você</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
text-align:center;
overflow:hidden;

background:linear-gradient(-45deg,#ff4d6d,#ff85a2,#ff4d6d,#ff85a2);
background-size:400% 400%;
animation:fundo 10s ease infinite;
}

@keyframes fundo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
color:white;
font-size:28px;
padding:20px;
text-shadow:0 0 15px white;
}

button{
font-size:20px;
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
cursor:pointer;
}

#sim{
background:#ff2e63;
color:white;
}

#nao{
background:white;
}

.heart{
position:absolute;
color:red;
animation:subir 6s linear infinite;
}

@keyframes subir{
from{
transform:translateY(100vh);
opacity:0;
}
to{
transform:translateY(-10vh);
opacity:1;
}
}

</style>
</head>

<body>

<h1>

💌 Minha namorada,

Obrigado por cada conversa,  
cada call que a gente faz  
e cada momento juntos. 🥰  

Eu amo muito você  
e nunca vou desistir da gente. ❤️  

Você é muito importante pra mim.

Então eu tenho uma pergunta...

💍 **Quer casar comigo um dia?**

</h1>

<div>
<button id="sim">💖 SIM</button>
<button id="nao">🙈 NÃO</button>
</div>

<script>

const nao=document.getElementById("nao")

nao.addEventListener("mouseover",()=>{
nao.style.position="absolute"
nao.style.left=Math.random()*90+"vw"
nao.style.top=Math.random()*90+"vh"
})

document.getElementById("sim").onclick=()=>{

document.body.innerHTML=`

<h1 style="color:white;font-size:35px;text-align:center">

💖 EU TE AMO MUITO 💖

Obrigado por aceitar  
você me faz muito feliz! 🥰

💍✨

</h1>

`

}

/* corações subindo */

setInterval(()=>{

const h=document.createElement("div")

h.className="heart"
h.innerHTML="❤"

h.style.left=Math.random()*100+"vw"
h.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),6000)

},400)

</script>

</body>
</html>
